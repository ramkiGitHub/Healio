<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6560C8"/>
      <stop offset="100%" stop-color="#3C3489"/>
    </linearGradient>
    <linearGradient id="barLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EEEDFE"/>
      <stop offset="100%" stop-color="#AFA9EC"/>
    </linearGradient>
    <linearGradient id="barDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8C4F8"/>
      <stop offset="100%" stop-color="#9B97E0"/>
    </linearGradient>
    <linearGradient id="dotGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D0CDFB"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>

  <!-- Subtle inner glow ring -->
  <rect x="6" y="6" width="500" height="500" rx="108" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="3"/>

  <!-- Left tall bar -->
  <rect x="130" y="148" width="78" height="216" rx="20" fill="url(#barLight)"/>

  <!-- Right top bar -->
  <rect x="242" y="148" width="78" height="130" rx="20" fill="url(#barDark)"/>

  <!-- Right bottom bar (shorter, accent) -->
  <rect x="242" y="296" width="78" height="68" rx="20" fill="url(#barLight)" opacity="0.85"/>

  <!-- Dot accent -->
  <circle cx="320" cy="382" r="22" fill="url(#dotGrad)"/>
  <circle cx="320" cy="382" r="10" fill="#534AB7"/>
</svg>
